name: Update Release Notes

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag name (e.g., 2.6.1)'
        required: true
        default: '2.6.1'
      release_notes_file:
        description: 'Path to release notes file'
        required: true
        default: 'docs/release-notes/2.6.1.md'

permissions:
  contents: read

jobs:
  update-release-notes:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # gh release edit updates the GitHub release
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Read release notes
        id: read_notes
        env:
          NOTES_FILE: ${{ inputs.release_notes_file }}
        run: |
          if [ -f "$NOTES_FILE" ]; then
            echo "Reading release notes from $NOTES_FILE"
            # Read the file and escape for GitHub Actions
            {
              echo 'RELEASE_NOTES<<EOF'
              cat "$NOTES_FILE"
              echo EOF
            } >> "$GITHUB_ENV"
          else
            echo "Error: Release notes file not found"
            exit 1
          fi

      - name: Update GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ inputs.tag }}
          REPO: ${{ github.repository }}
        run: |
          gh release edit "$TAG" \
            --notes "$RELEASE_NOTES" \
            --repo "$REPO"

      - name: Success message
        env:
          TAG: ${{ inputs.tag }}
          REPO: ${{ github.repository }}
        run: |
          echo "✅ Release notes updated successfully for tag $TAG"
          echo "View at: https://github.com/$REPO/releases/tag/$TAG"

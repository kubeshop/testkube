name: Release kubectl-testkube

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: read

env:
  TESTKUBE_CHOCO_REPO: https://chocolatey.kubeshop.io/
  ALPINE_IMAGE: alpine:3.23.3
  BUSYBOX_IMAGE: busybox:1.36.1-musl

jobs:
  pre_build:
    name: Pre-build
    runs-on: depot-ubuntu-22.04
    strategy:
      matrix:
        include:
          - name: "linux"
            path: .builds-linux.goreleaser.yml
          - name: "windows"
            path: .builds-windows.goreleaser.yml
          - name: "darwin"
            path: .builds-darwin.goreleaser.yml
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: stable
          # Disable build caching so a poisoned shared cache cannot influence released artifacts.
          cache: false
      - name: Get tag
        id: tag
        uses: dawidd6/action-get-tag@727a6f0a561be04e09013531e73a3983a65e3479 # v1.1.0
        with:
          strip_v: true
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          distribution: goreleaser-pro
          version: 'v2.3.2' # 2.4.4 fails with "no such file or directory"
          args: release -f ${{ matrix.path }} --skip=publish
        env:
          GITHUB_TOKEN: ${{ secrets.CI_BOT_TOKEN }}
          ANALYTICS_TRACKING_ID: "${{secrets.TESTKUBE_CLI_GA_MEASUREMENT_ID}}"
          ANALYTICS_API_KEY: "${{secrets.TESTKUBE_CLI_GA_MEASUREMENT_SECRET}}"
          KEYGEN_PUBLIC_KEY: "${{secrets.KEYGEN_PUBLIC_KEY}}"
          # Your GoReleaser Pro key, if you are using the 'goreleaser-pro' distribution
          GORELEASER_KEY: ${{ secrets.GORELEASER_KEY }}
          DOCKER_BUILDX_BUILDER: "${{ steps.buildx.outputs.name }}"
          DOCKER_BUILDX_CACHE_FROM: "type=gha"
          DOCKER_BUILDX_CACHE_TO: "type=gha,mode=max"
          ALPINE_IMAGE: ${{ env.ALPINE_IMAGE }}
          BUSYBOX_IMAGE: ${{ env.BUSYBOX_IMAGE }}
          DOCKER_IMAGE_TAG: ${{steps.tag.outputs.tag}}
      - name: Upload Artifacts
        uses: actions/upload-artifact@0c366cb4fc8897159c94880f94b55bc716ad6a66 # master as of 2026-07-15
        with:
          name: testkube_${{ matrix.name }}
          path: |
            ${{ matrix.name }}/testkube_${{ matrix.name }}_*
          retention-days: 1

  release:
    name: Create and upload release-artifacts
    needs: pre_build
    runs-on: depot-ubuntu-22.04

    steps:
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          app-id: 253113
          private-key: ${{ secrets.TESTKUBE_GH_APP_GITOPS_KEY }}
          owner: kubeshop
          repositories: |
            testkube
            homebrew-testkube
          permission-contents: write
      - name: Get GitHub App User ID
        id: get-user-id
        run: echo "user-id=$(gh api "/users/${{ steps.app-token.outputs.app-slug }}[bot]" --jq .id)" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: false
      - name: Configure git
        run: |
          git config --global user.name '${{ steps.app-token.outputs.app-slug }}[bot]'
          git config --global user.email '${{ steps.get-user-id.outputs.user-id }}+${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com'
          git config --global url."https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/".insteadOf "https://github.com/"
      - uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
      - name: Download Artifacts for Linux
        uses: actions/download-artifact@2a5974104b6d5dbdb2f9468a3e54da3bdd241578 # master as of 2026-07-15
        with:
          name: testkube_linux
          path: linux
      - name: Download Artifacts for Windows
        uses: actions/download-artifact@2a5974104b6d5dbdb2f9468a3e54da3bdd241578 # master as of 2026-07-15
        with:
          name: testkube_windows
          path: windows
      - name: Download Artifacts for Darwin
        uses: actions/download-artifact@2a5974104b6d5dbdb2f9468a3e54da3bdd241578 # master as of 2026-07-15
        with:
          name: testkube_darwin
          path: darwin
      # Added as a workaround since files lose their permissions when being moved from one stage to another in GH. A bug was reported
      # and will be fixed in the next release of GoReleaser, thus we will be able to remove this code.
      - name: Add executable mode
        run: chmod -R +x linux/ darwin/
      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: stable
          # Disable build caching so a poisoned shared cache cannot influence released artifacts.
          cache: false
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          distribution: goreleaser-pro
          version: 'v2.3.2' # 2.4.4 fails with "no such file or directory"
          args: release -f .goreleaser.yml
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          ANALYTICS_TRACKING_ID: "${{secrets.TESTKUBE_CLI_GA_MEASUREMENT_ID}}"
          ANALYTICS_API_KEY: "${{secrets.TESTKUBE_CLI_GA_MEASUREMENT_SECRET}}"
          SLACK_BOT_CLIENT_ID: "${{secrets.TESTKUBE_SLACK_BOT_CLIENT_ID}}"
          SLACK_BOT_CLIENT_SECRET: "${{secrets.TESTKUBE_SLACK_BOT_CLIENT_SECRET}}"
          # Your GoReleaser Pro key, if you are using the 'goreleaser-pro' distribution
          GORELEASER_KEY: ${{ secrets.GORELEASER_KEY }}
      - name: Get tag
        id: tag
        uses: dawidd6/action-get-tag@727a6f0a561be04e09013531e73a3983a65e3479 # v1.1.0
        with:
          strip_v: true
      - name: Publish package
        env:
          USERNAME: "aptly"
          PASSWORD: ${{ secrets.APTLY_PASSWORD }}
          APTLY_URL: "repo.testkube.io:8080"
          VERSION: ${{steps.tag.outputs.tag}}
        run: |
          ### Clean temporary file directory first (in case of re-runs)
          curl -u "${USERNAME}:${PASSWORD}" -X DELETE "http://${APTLY_URL}/api/files/testkube" || true

          ### Remove existing packages from the repository (ignore errors if they don't exist)
          curl -u "${USERNAME}:${PASSWORD}" -X DELETE "http://${APTLY_URL}/api/repos/testkube/packages?q=testkube+%28%3D+${VERSION}%29" || true

          ### Upload files for all architectures
          curl --fail-with-body -u "${USERNAME}:${PASSWORD}" -X POST -F "file=@dist/testkube_${VERSION}_linux_amd64.deb" "http://${APTLY_URL}/api/files/testkube"
          curl --fail-with-body -u "${USERNAME}:${PASSWORD}" -X POST -F "file=@dist/testkube_${VERSION}_linux_arm64.deb" "http://${APTLY_URL}/api/files/testkube"

          ### Add file to repo
          curl --fail-with-body -u "${USERNAME}:${PASSWORD}" -X POST "http://${APTLY_URL}/api/repos/testkube/file/testkube"

          ### Create snapshot with timestamp to avoid conflicts on re-runs
          SNAPSHOT_NAME="testkube-${VERSION}-$(date +%s)"
          curl --fail-with-body -u "${USERNAME}:${PASSWORD}" -X POST -H 'Content-Type: application/json' --data '{"Name":"'"${SNAPSHOT_NAME}"'"}' "http://${APTLY_URL}/api/repos/testkube/snapshots"

          ### Publish repo with new snapshot (ForceOverwrite handles conflicts in published pool)
          curl --fail-with-body -u "${USERNAME}:${PASSWORD}" -X PUT -H 'Content-Type: application/json' --data '{"Snapshots": [{"Component": "main", "Name": "'"${SNAPSHOT_NAME}"'"}], "ForceOverwrite": true}' "http://${APTLY_URL}/api/publish/:linux/linux"

  # This is a Docker image for "Docker" Testkube Agent.
  # This image runs Testkube in Kind (Kubernetes in Docker) in Docker.
  build_agent_image:
    name: Build a Docker image for Testkube Agent
    runs-on: depot-ubuntu-22.04
    env:
      TESTKUBE_CLOUD_URL: "agent.testkube.io:443"

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Login to Docker Hub
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Get tag
        id: tag
        uses: dawidd6/action-get-tag@727a6f0a561be04e09013531e73a3983a65e3479 # v1.1.0
        with:
          strip_v: true

      - name: Preload kind images
        run: |
          mkdir -p build/kind/images/arm
          mkdir -p build/kind/images/amd

          docker pull --platform linux/arm64 kindest/node:v1.31.0
          docker save kindest/node:v1.31.0 > build/kind/images/arm/node.tar

          docker pull --platform linux/amd64 kindest/node:v1.31.0
          docker save kindest/node:v1.31.0 > build/kind/images/amd/node.tar

      - name: Build and push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          build-args: |
            segmentio_key=${{secrets.TESTKUBE_SEGMENTIO_KEY}}
            ga_id=${{secrets.TESTKUBE_CLI_GA_MEASUREMENT_ID}}
            ga_secret=${{secrets.TESTKUBE_CLI_GA_MEASUREMENT_SECRET}}
            docker_image_version=${{steps.tag.outputs.tag}}
            cloud_url=${{ env.TESTKUBE_CLOUD_URL }}
          context: build/kind
          file: build/kind/kind.Dockerfile
          platforms: linux/amd64,linux/arm64
          provenance: mode=max
          push: true
          sbom: true
          tags: |
            kubeshop/testkube-agent:${{steps.tag.outputs.tag}}
            kubeshop/testkube-agent:latest

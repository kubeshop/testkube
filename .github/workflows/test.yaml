name: Code build and checks

on:
  push:
    branches: [main]
    paths-ignore: ["docs/**"]
  pull_request:
    paths-ignore: ["docs/**"]
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]


permissions:
  contents: read

jobs:
  unit-tests:
    name: Unit Tests
    if: (github.event_name != 'pull_request' || github.event.pull_request.draft == false) && github.actor != 'renovate[bot]' && github.actor != 'dependabot[bot]'
    runs-on: depot-ubuntu-24.04
    permissions:
      contents: read
      checks: write  # For test annotations
      pull-requests: write  # For PR comments

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: '1.26'
          cache: false

      - name: Cache Go modules
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/go/pkg/mod
            bin/tooling
          key: ${{ runner.os }}-go-unit-${{ hashFiles('go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-unit-

      - name: Show Go environment
        run: |
          go env GOCACHE
          go env GOMODCACHE
          echo "Test tool location:"
          ls -la bin/tooling/ || echo "No tools cached yet"

      - name: Unit Test
        id: unit_test
        run: make unit-tests

      - name: Unit Test Summary
        if: always()
        uses: test-summary/action@37b508cfee6d4d080eedd00b5bb240a6a784a6a5 # v2.6
        with:
          paths: |
            unit-tests.xml

      - name: Annotate Unit Tests
        if: always()
        uses: guyarb/golang-test-annotations@96fc379b171c49932041d6c789e73331a7bdeec1 # v0.9.0
        with:
          test-results: unit-tests.json

      - name: Upload code coverage artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: unit-test-coverage
          path: coverage.out
          if-no-files-found: error
          retention-days: 1

  integration-tests:
    name: Integration Tests
    if: (github.event_name != 'pull_request' || github.event.pull_request.draft == false) && github.actor != 'renovate[bot]' && github.actor != 'dependabot[bot]'
    runs-on: depot-ubuntu-24.04
    permissions:
      contents: read
      checks: write  # For test annotations
      pull-requests: write  # For PR comments

    services:
      mongo:
        image: bitnamilegacy/mongodb:8.0
        ports:
          - 27017:27017
      nats:
        image: bitnamilegacy/nats:2
        ports:
          - 4222:4222
          - 6222:6222
          - 8222:8222
      minio:
        image: bitnamilegacy/minio:2025
        ports:
          - 9000:9000
          - 9001:9001
        env:
          MINIO_ROOT_USER: minio99
          MINIO_ROOT_PASSWORD: minio123
      postgres:
        image: postgres:16.13
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: testkube_users_test
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: '1.26'
          cache: false

      - name: Cache Go modules
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/go/pkg/mod
            bin/tooling
          key: ${{ runner.os }}-go-integration-${{ hashFiles('go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-integration-

      - name: Show Go environment
        run: |
          go env GOCACHE
          go env GOMODCACHE
          echo "Test tool location:"
          ls -la bin/tooling/ || echo "No tools cached yet"

      - name: Create k8s Kind Cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0

      - name: Integration Tests
        env:
          STORAGE_ACCESSKEYID: minio99
          STORAGE_SECRETACCESSKEY: minio123
        run: make integration-tests

      - name: Integration Test Summary
        if: always()
        uses: test-summary/action@37b508cfee6d4d080eedd00b5bb240a6a784a6a5 # v2.6
        with:
          paths: |
            integration-tests.xml

      - name: Annotate Integration Tests
        if: always()
        uses: guyarb/golang-test-annotations@96fc379b171c49932041d6c789e73331a7bdeec1 # v0.9.0
        with:
          test-results: integration-tests.json

      - name: Upload code coverage artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: integration-test-coverage
          path: integration-coverage.out
          if-no-files-found: error
          retention-days: 1

  verify-generated-protobuf:
    name: Verify generated protobuf
    if: (github.event_name != 'pull_request' || github.event.pull_request.draft == false) && github.actor != 'renovate[bot]' && github.actor != 'dependabot[bot]'
    runs-on: depot-ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: '1.26'
          cache: false

      - name: Cache Go modules
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/go/pkg/mod
            bin/tooling
          key: ${{ runner.os }}-go-verify-proto-${{ hashFiles('go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-verify-proto-

      - name: Verify generated protobuf
        run: make verify-protobuf-generated

  verify-generated-crds:
    name: Verify generated CRDs
    if: (github.event_name != 'pull_request' || github.event.pull_request.draft == false) && github.actor != 'renovate[bot]' && github.actor != 'dependabot[bot]'
    runs-on: depot-ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: '1.26'
          cache: false

      - name: Cache Go modules
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/go/pkg/mod
            bin/tooling
          key: ${{ runner.os }}-go-verify-crds-${{ hashFiles('go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-verify-crds-

      - name: Show Go environment
        run: |
          go env GOCACHE
          go env GOMODCACHE
          echo "Test tool location:"
          ls -la bin/tooling/ || echo "No tools cached yet"

      - name: Verify generated CRDs
        run: make verify-crds-generated

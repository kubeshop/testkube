name: Build
on:
  push:
    tags:
      - "[0-9].[0-9]+.[0-9]+"
      - "[0-9].[0-9]+.[0-9]+-preview.[0-9]+"
      - "[0-9].[0-9]+.[0-9]+-rc.[0-9]+"
      - "[0-9].[0-9]+.[0-9]+-dev.[0-9]+"
      - "[0-9].[0-9]+.[0-9]+-beta.[0-9]+"
    branches-ignore:
      - renovate/**
      - dependabot/**
      
env:
  ALPINE_IMAGE: alpine:3.23.3
  BUSYBOX_IMAGE: busybox:1.36.1-musl

permissions:
  contents: read

jobs:
  build:
    runs-on: depot-ubuntu-22.04
    permissions:
      contents: read
      id-token: write # needed for depot
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Depot CLI
        uses: depot/setup-action@15c09a5f77a0840ad4bce955686522a257853461 # v1.7.1

      - name: Login to DockerHub
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create Docker tags and metadata for the API
        id: api-meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          bake-target: "api-meta"
          images: |
            kubeshop/testkube-api-server
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}

      - name: Create Docker tags and metadata for the API
        id: cli-meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          bake-target: "cli-meta"
          images: |
            kubeshop/testkube-cli
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}

      - name: Create Docker tags and metadata for tw-init
        id: tw-init-meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          bake-target: "tw-init-meta"
          images: |
            kubeshop/testkube-tw-init
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}

      - name: Create Docker tags and metadata for tw-toolkit
        id: tw-toolkit-meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          bake-target: "tw-toolkit-meta"
          images: |
            kubeshop/testkube-tw-toolkit
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}

      - name: Create Docker tags and metadata for mcp-server
        id: mcp-server-meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          bake-target: "mcp-server-meta"
          images: |
            kubeshop/mcp-server
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}

      - uses: benjlevesque/short-sha@dbe07338b37c456ce06d23409b35a56a7815eef4 # v4.0
        id: short-sha
        with:
          length: 7

      - name: Build
        uses: depot/bake-action@1d58c2668346981089b088b7ef36755b206b20e9 # v1.13.0
        with:
          files: |
            ./docker-bake.hcl
            ${{ steps.api-meta.outputs.bake-file }}
            ${{ steps.cli-meta.outputs.bake-file }}
            ${{ steps.tw-init-meta.outputs.bake-file }}
            ${{ steps.tw-toolkit-meta.outputs.bake-file }}
            ${{ steps.mcp-server-meta.outputs.bake-file }}
          targets: api,cli,tw-init,tw-toolkit,mcp-server
          provenance: mode=max
          sbom: true
          # Only tags are pushed, pushes to branches test whether app can be built.
          push: ${{github.ref_type == 'tag'}}
          save: true
          save-tag: ${{ steps.short-sha.outputs.sha }}
        env:
          VERSION: ${{ fromJSON(steps.api-meta.outputs.json).labels['org.opencontainers.image.version'] }}
          GIT_SHA: ${{ fromJSON(steps.api-meta.outputs.json).labels['org.opencontainers.image.revision'] }}
          SLACK_BOT_CLIENT_ID: ${{secrets.TESTKUBE_SLACK_BOT_CLIENT_ID}}
          SLACK_BOT_CLIENT_SECRET: ${{secrets.TESTKUBE_SLACK_BOT_CLIENT_SECRET}}
          ANALYTICS_TRACKING_ID: ${{secrets.TESTKUBE_API_GA_MEASUREMENT_ID}}
          ANALYTICS_API_KEY: ${{secrets.TESTKUBE_API_GA_MEASUREMENT_SECRET}}
          KEYGEN_PUBLIC_KEY: ${{secrets.KEYGEN_PUBLIC_KEY}}
          SEGMENTIO_KEY: ${{secrets.TESTKUBE_API_SEGMENTIO_KEY}}
          CLOUD_SEGMENTIO_KEY: ${{secrets.TESTKUBE_API_CLOUD_SEGMENTIO_KEY}}

  helm:
    runs-on: depot-ubuntu-22.04
    needs: build
    # Only runs on releases (candidates) and preview releases, excluding -dev and -beta
    if: ${{ startsWith(github.event.ref, 'refs/tags') && !contains(github.event.ref, '-dev') && !contains(github.event.ref, '-beta') }}
    permissions:
      contents: read
      id-token: write
    env:
      GAR_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID_PROD }}
      GAR_LOCATION: ${{ secrets.GAR_LOCATION }}
      CHARTS_REPOSITORY: testkube
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - id: helm-version
        name: Extract Helm Chart version
        uses: mikefarah/yq@e2f1d5ccf73239195bf92280cd47596751492449 # master as of 2026-07-15
        with:
          cmd: yq '.version' k8s/helm/testkube/Chart.yaml

      - name: Auth to Google Cloud
        if: ${{ github.ref_type == 'tag' }}
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          project_id: ${{ env.GAR_PROJECT_ID }}
          credentials_json: ${{ secrets.GKE_SA_KEY_PROD }} #Key to SA in Testkube Prod project

      - name: Configure Docker for GAR
        if: ${{ github.ref_type == 'tag' }}
        run: gcloud auth configure-docker "${GAR_LOCATION}-docker.pkg.dev" -q

      - name: Login to DockerHub
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - id: helm-publish
        name: Publish Helm Chart
        env:
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          HELM_VERSION: ${{ steps.helm-version.outputs.result }}
        run: |
          REGISTRY=registry-1.docker.io
          REGISTRY_GAR="${GAR_LOCATION}-docker.pkg.dev"

          printf '%s' "$DOCKERHUB_TOKEN" | helm registry login "$REGISTRY" --username "$DOCKERHUB_USERNAME" --password-stdin
          helm repo add cloudnative-pg https://cloudnative-pg.github.io/charts --force-update

          # testkube chart
          helm dependency build k8s/helm/testkube
          helm package k8s/helm/testkube
          helm push "testkube-${HELM_VERSION}.tgz" "oci://${REGISTRY}/kubeshop"
          helm push "testkube-${HELM_VERSION}.tgz" "oci://${REGISTRY_GAR}/${GAR_PROJECT_ID}/${CHARTS_REPOSITORY}"

          # testkube runner chart
          helm dependency build k8s/helm/testkube-runner
          helm package k8s/helm/testkube-runner
          helm push "testkube-runner-${HELM_VERSION}.tgz" "oci://${REGISTRY}/kubeshop"
          helm push "testkube-runner-${HELM_VERSION}.tgz" "oci://${REGISTRY_GAR}/${GAR_PROJECT_ID}/${CHARTS_REPOSITORY}"

      - id: helm-index-update
        name: Dispatch update for legacy Helm index
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          github-token: ${{ secrets.CI_BOT_TOKEN }}
          script: |
            github.rest.actions.createWorkflowDispatch({
              owner: 'kubeshop',
              repo: 'helm-charts',
              ref: 'main',
              workflow_id: 'index-update.yaml',
              inputs: {
                chart_version: '${{ steps.helm-version.outputs.result }}'
              }
            })

  publish_mcp_registry:
    name: Publish to MCP Registry
    runs-on: depot-ubuntu-22.04
    needs: build
    # Only publish to MCP Registry for final release tags (e.g., 2.7.0), not preview/rc/dev/beta
    if: ${{ startsWith(github.event.ref, 'refs/tags') && !contains(github.event.ref, '-') }}
    permissions:
      id-token: write
      contents: read
    env:
      DOCKER_IMAGE: kubeshop/mcp-server
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Get version tag
        id: tag
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Using version from tag: $TAG"

      - name: Update server.json with version
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          cd build/mcp-server
          jq --arg version "$TAG" \
            '.version = $version | .packages[0].identifier = "docker.io/kubeshop/mcp-server:" + $version' \
            server.json > server.json.tmp
          mv server.json.tmp server.json

          echo "Updated server.json:"
          cat server.json

      - name: Install mcp-publisher
        env:
          MCP_PUBLISHER_VERSION: v1.5.0
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/download/${MCP_PUBLISHER_VERSION}/mcp-publisher_linux_amd64.tar.gz" | tar xz
          chmod +x mcp-publisher
          ./mcp-publisher --version

      - name: Authenticate via GitHub OIDC
        run: ./mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        run: |
          cd build/mcp-server
          ../../mcp-publisher publish

      - name: Verify publication
        run: |
          echo "Waiting for registry to update..."
          sleep 30

          echo "Verifying publication..."
          curl -f https://registry.modelcontextprotocol.io/v0/servers/io.github.kubeshop/testkube-mcp || \
            echo "Warning: Could not verify publication immediately. It may take a few minutes to appear."

      - name: Summary
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          echo "MCP Server v${TAG} published to MCP Registry"
          echo "Registry URL: https://registry.modelcontextprotocol.io/v0/servers/io.github.kubeshop/testkube-mcp"

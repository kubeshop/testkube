kind: TestWorkflow
apiVersion: testworkflows.testkube.io/v1
metadata:
  name: cloud-ui-e2e-cron-trigger
  labels:
    core-tests: workflows-suite-trigger
    type: workflow-trigger
spec:
  container:
    resources:
      requests:
        cpu: 32m
        memory: 32Mi
  steps:
  - execute:
      workflows:
      - name: cloud-ui-e2e
  events:
  - cronjob:
      cron: "20 0,8,16 * * *" # 3 times a day at 00:20, 08:20 and 16:20

apiVersion: testworkflows.testkube.io/v1
kind: TestWorkflow
metadata:
  name: prod-healthchecks-workflow-suite
  labels:
    core-tests: workflows-suite
    type: suite
    tool: healthcheck
spec:
  container:
    resources:
      requests:
        cpu: 32m
        memory: 32Mi
  steps:
  - execute:
      parallelism: 5
      workflows:
      - name: prod-healthcheck
      - name: prod-eu-healthcheck
      - name: public-demo-healthcheck
      - name: paris-healthcheck
      - name: license-healthcheck

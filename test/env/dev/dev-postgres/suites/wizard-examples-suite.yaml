kind: TestWorkflow
apiVersion: testworkflows.testkube.io/v1
metadata:
  name: wizard-examples-suite
  labels:
    core-tests: workflows-suite
    type: workflow-suite
description: "UI examples"
spec:
  container:
    resources:
      requests:
        cpu: 32m
        memory: 32Mi
  steps:
  - execute:
      parallelism: 2
      workflows:
        - selector:
            matchLabels:
              core-tests: wizard-examples

apiVersion: executor.testkube.io/v1
kind: Webhook
metadata:
  name: slack-cloud-ui-e2e-alerts
spec:
  events:
  - end-testworkflow-failed
  - end-testworkflow-aborted
  uri: '{{credential("webhook-slack-cloud-ui-e2e-alerts-url")}}'
  selector: core-tests=cloud-ui-e2e
  payloadTemplate: |-
    {
    	"text": ":alert: Cloud UI E2E tests at .dev Postgres \n *Name*: {{.TestWorkflowExecution.Name}} \n *Status*: {{ .Type_ }} \n *Logs*: {{ .ExecutionURL }}"
    }

apiVersion: executor.testkube.io/v1
kind: Webhook
metadata:
  name: prod-healthcheck-alerts
spec:
  events:
  - end-testworkflow-failed
  - end-testworkflow-aborted
  uri: '{{credential("webhook-slack-prod-healthcheck-alerts-url")}}'
  selector: environment=prod
  payloadTemplate: |-
    {
    	"text": ":alert: Testkube prod-healthcheck failed \n *Name*: {{.TestWorkflowExecution.Name}} \n *Status*: {{ .Type_ }} \n *Logs*: {{ .ExecutionURL }}"
    }

apiVersion: executor.testkube.io/v1
kind: Webhook
metadata:
  name: prod-healthcheck-alerts
  namespace: testkube-agent  
spec:
  events:
  - end-testworkflow-failed
  uri: https://hooks.slack.com/services/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
  selector: environment=prod
  payloadTemplate: |-
    {
    	"text": ":alert: Testkube prod-healthcheck failed \n *Name*: {{.TestWorkflowExecution.Name}} \n *Status*: {{ .Type_ }} \n *Logs*: https://app.testkube.dev/organization/{{ index .Envs "TESTKUBE_PRO_ORG_ID" }}/environment/{{ index .Envs "TESTKUBE_PRO_ENV_ID" }}/dashboard/test-workflows/{{ .TestWorkflowExecution.Workflow.Name }}/executions/{{ .TestWorkflowExecution.Id }}"
    }
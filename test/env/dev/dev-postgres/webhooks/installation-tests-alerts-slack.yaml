apiVersion: executor.testkube.io/v1
kind: Webhook
metadata:
  name: slack-installation-alerts
  namespace: testkube-agent  
spec:
  events:
  - end-testworkflow-failed
  - end-testworkflow-aborted
  uri: '{{credential("webhook-slack-installation-alerts-url")}}'
  selector: core-tests=installation
  payloadTemplate: |-
    {
    	"text": ":alert: Testkube Installation test \n *Name*: {{.TestWorkflowExecution.Name}} \n *Status*: {{ .Type_ }} \n *Logs*: https://app.testkube.dev/organization/{{ index .Envs "TESTKUBE_PRO_ORG_ID" }}/environment/{{ index .Envs "TESTKUBE_PRO_ENV_ID" }}/dashboard/test-workflows/{{ .TestWorkflowExecution.Workflow.Name }}/executions/{{ .TestWorkflowExecution.Id }}"
    }


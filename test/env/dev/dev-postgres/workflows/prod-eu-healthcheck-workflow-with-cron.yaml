kind: TestWorkflow
apiVersion: testworkflows.testkube.io/v1
metadata:
  name: prod-eu-healthcheck
  labels:
    core-tests: healthcheck
    environment: prod # triggers prod-specific webhooks
spec:
  system:
    pureByDefault: true
  job:
    activeDeadlineSeconds: 180
  container:
    image: kubeshop/testkube-cli:latest
    resources:
      requests:
        cpu: 32m
        memory: 32Mi
    env:
      - name: apiToken
        valueFrom:
          secretKeyRef:
            name: testkube-agent-secrets
            key: TESTKUBE-CLOUD-EU-TESTKUBE-RUN-TOKEN-FOR-DEV
      - name: organizationId
        valueFrom:
          secretKeyRef:
            name: testkube-agent-secrets
            key: TESTKUBE-CLOUD-EU-TESTKUBE-ORG-ID
      - name: environmentId
        valueFrom:
          secretKeyRef:
            name: testkube-agent-secrets
            key: TESTKUBE-CLOUD-EU-TESTKUBE-ENV-ID
  events:
  - cronjob:
      cron: "*/15 * * * *" # every 15 minutes
  steps:
  - name: Disable telemetry (optional)
    optional: true
    shell: testkube disable telemetry
  - name: Set context
    shell: |
      testkube set context \
        --api-key {{ shellquote(env.apiToken) }} \
        --org-id {{ shellquote(env.organizationId) }} \
        --env-id {{ shellquote(env.environmentId) }} \
        --root-domain eu.testkube.io
  - name: Run remote workflow
    shell: testkube run tw postman-workflow-smoke -f
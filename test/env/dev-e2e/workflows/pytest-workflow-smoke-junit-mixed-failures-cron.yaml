kind: TestWorkflow
apiVersion: testworkflows.testkube.io/v1
metadata:
  name: pytest-workflow-smoke-junit-mixed-failures-cron-trigger
  labels:
    core-tests: workflows-suite-trigger
    type: workflow-trigger
spec:
  container:
    resources:
      requests:
        cpu: 32m
        memory: 32Mi
  steps:
  - execute:
      workflows:
      - name: pytest-workflow-smoke-junit-mixed-failures
  events:
  - cronjob:
      cron: "50 * * * *" # every 1 hour

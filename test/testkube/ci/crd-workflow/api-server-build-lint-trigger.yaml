apiVersion: tests.testkube.io/v1
kind: TestTrigger
metadata:
  name: api-server-ci-main-content-trigger
  namespace: testkube
spec:
  resource: content
  event: modified
  contentSelector:
    git:
      uri: https://github.com/kubeshop/testkube
      branches:
        - main
  action: run
  execution: testworkflow
  testSelector:
    name: api-server-ci-build-lint
    namespace: testkube

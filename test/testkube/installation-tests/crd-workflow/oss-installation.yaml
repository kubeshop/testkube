apiVersion: testworkflows.testkube.io/v1
kind: TestWorkflow
metadata:
  name: oss-standalone-installation-test
  labels:
    core-tests: installation
    tool: testkube-oss
spec:
  system:
    pureByDefault: true
  content:
    git:
      uri: https://github.com/kubeshop/testkube
      revision: main
      paths:
        - test/postman/crd-workflow/smoke.yaml
  container:
    workingDir: /data/repo/test/postman/crd-workflow
    resources:
      requests:
        cpu: "500m"
        memory: "256Mi"
  use:
    - name: setup-dind-kind-cluster-template
  steps:
    - name: Install Testkube OSS
      shell: |
        kubectl config set-context kind-kind
        testkube disable telemetry
        testkube init standalone-agent --namespace testkube --no-confirm --helm-arg wait= --helm-arg timeout=10m
        kubectl get all -n testkube
        testkube disable telemetry
    - name: Wait for Testkube core components to be ready
      optional: true
      shell: |
        for dep in testkube-api-server testkube-mongodb testkube-minio-testkube; do
          echo "⏳ Waiting for $dep..."
          kubectl rollout status deployment/$dep -n testkube --timeout=300s || exit 1
        done

        echo "⏳ Waiting for testkube-api-server endpoint..."
        for i in {1..30}; do
          kubectl get endpoints testkube-api-server -n testkube -o jsonpath='{.subsets[*].addresses[*].ip}' | \
            grep -qE '[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+' && break
          sleep 2
        done

        echo "✅ Testkube core components and API service are ready."
    - name: Apply TestWorkflow
      shell: |
        kubectl apply -f smoke.yaml -n testkube
        kubectl get testworkflow postman-workflow-smoke-junit -n testkube && echo "found" || kubectl get all -n testkube
    - name: Run TestWorkflow
      shell: testkube run tw postman-workflow-smoke-junit --watch && echo "executed correctly"
    - name: Dump pod logs and describe
      condition: always
      shell: |
        set +e

        NS=testkube
        OUT=/data/artifacts/pod-logs
        mkdir -p "$OUT"

        echo "=== Pods in namespace $NS ==="
        kubectl -n "$NS" get pods -o wide > "$OUT/pods.txt" 2>&1 || true

        echo "=== Events in namespace $NS ==="
        kubectl -n "$NS" get events --sort-by=.lastTimestamp > "$OUT/events.txt" 2>&1 || true

        kubectl -n "$NS" get pods -o jsonpath='{range .items[*]}{.metadata.name}{"\n"}{end}' |
        while read -r POD; do
          echo "=== Dumping $POD ==="

          kubectl -n "$NS" describe pod "$POD" \
            > "$OUT/$POD.describe.txt" 2>&1 || true

          kubectl -n "$NS" logs "$POD" --all-containers --timestamps \
            > "$OUT/$POD.log" 2>&1 || true

          kubectl -n "$NS" logs "$POD" --all-containers --previous --timestamps \
            > "$OUT/$POD.previous.log" 2>&1 || true
        done
      artifacts:
        workingDir: /data/artifacts/
        paths:
        - '**/*'
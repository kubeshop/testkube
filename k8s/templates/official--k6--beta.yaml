kind: TestWorkflowTemplate
apiVersion: testworkflows.testkube.io/v1
metadata:
  name: official--k6--beta
  labels:
    testkube.io/name: k6
    testkube.io/wizard: disabled
  annotations:
    testkube.io/categories: Load & Performance
    testkube.io/description: Run k6 tests
    testkube.io/icon: k6
    testkube.io/example-path: k6.js
    testkube.io/example: |
      import http from "k6/http";
      import { check, sleep } from "k6";

      export const options = {
        thresholds: {
          "http_req_duration{scenario:default}": ["p(95)<2000"],
          "http_reqs{scenario:default}": ["count>0"],
          "http_req_failed{scenario:default}": ["rate<0.5"],
        },
      };

      export default function () {
        const res = http.get("https://test.k6.io");
        check(res, { "status is 200": (r) => r.status === 200 });
        sleep(1);
      }
spec:
  config:
    version:
      description: k6 version to use
      type: string
      default: 0.49.0
    run:
      description: Run command
      type: string
      default: "mkdir -p /data/artifacts && k6 run k6.js --summary-export /data/artifacts/summary.json"
  steps:
  - name: Run k6 tests
    run:
      image: "grafana/k6:{{ config.version }}"
      shell: "{{ config.run }}"
    artifacts:
      paths:
      - /data/artifacts/*

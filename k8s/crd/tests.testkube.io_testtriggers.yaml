                        ".spec.template.spec.containers.0.image". Array elements use .N syntax.
                      type: string
                    value:
                      description: Value to compare against. Required for equals,
                        not_equals, changed_to, changed_from.
                      type: string
                  required:
                  - operator
                  - path
                  type: object
                type: array

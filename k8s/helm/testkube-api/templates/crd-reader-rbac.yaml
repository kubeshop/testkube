{{- /*
Cluster-scoped CRD read for the agent's cluster-resources inventory
(internal/inventory): the agent lists/watches CustomResourceDefinitions to build
the inventory snapshot it pushes to the Control Plane. CRDs are cluster-scoped
resources, so this ClusterRole is required in every install mode (a namespaced
Role can't grant CRD access). Without it the inventory push has no CRD schemas
and live refresh on CRD changes stops working.
*/}}
{{- if .Values.rbac.create }}
apiVersion: {{ include "global.capabilities.rbac.apiVersion" . }}
kind: ClusterRole
metadata:
  name: crd-reader-{{ .Release.Name }}
  labels: {{- include "testkube-api.labels" . | nindent 4 }}
    {{- if .Values.global.labels }}
    {{- include "global.tplvalues.render" ( dict "value" .Values.global.labels "context" $ ) | nindent 4 }}
    {{- end }}
rules:
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list", "watch"]
---
apiVersion: {{ include "global.capabilities.rbac.apiVersion" . }}
kind: ClusterRoleBinding
metadata:
  name: crd-reader-{{ .Release.Name }}
  labels: {{- include "testkube-api.labels" . | nindent 4 }}
    {{- if .Values.global.labels }}
    {{- include "global.tplvalues.render" ( dict "value" .Values.global.labels "context" $ ) | nindent 4 }}
    {{- end }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: crd-reader-{{ .Release.Name }}
subjects:
  - kind: ServiceAccount
    name: {{ include "testkube-api.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}

suite: testkube-runner crds
templates:
  - templates/crds.yaml
release:
  name: tk
tests:
  - it: renders CRDs when gitops.enabled=true and gitops.installCRD=true
    set:
      gitops.enabled: true
      gitops.installCRD: true
    asserts:
      - containsDocument:
          kind: CustomResourceDefinition
          apiVersion: apiextensions.k8s.io/v1

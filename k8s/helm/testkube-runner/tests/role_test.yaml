suite: testkube-runner roles
templates:
  - role.yaml
release:
  name: tk
  namespace: testkube-dev
tests:
  - it: renders agent-role, agent-lease-access and exec-role by default
    asserts:
      - hasDocuments:
          count: 3
      - equal:
          path: metadata.name
          value: agent-role-tk
        documentIndex: 0
      - equal:
          path: metadata.name
          value: agent-lease-access-tk
        documentIndex: 1
      - equal:
          path: metadata.name
          value: exec-role-tk
        documentIndex: 2

  - it: agent-role grants the expected verbs on secrets and configmaps
    documentSelector:
      path: metadata.name
      value: agent-role-tk
    asserts:
      - contains:
          path: rules
          content:
            apiGroups: [""]
            resources:
              - secrets
              - configmaps
            verbs:
              - get
              - create
              - patch
              - update
              - delete

  - it: agent-role can read its own Deployment for registration label collection
    documentSelector:
      path: metadata.name
      value: agent-role-tk
    asserts:
      - contains:
          path: rules
          content:
            apiGroups:
              - apps
            resources:
              - deployments
            verbs:
              - get

  - it: agent-lease-access targets coordination.k8s.io/leases
    documentSelector:
      path: metadata.name
      value: agent-lease-access-tk
    asserts:
      - equal:
          path: rules[0].apiGroups[0]
          value: coordination.k8s.io
      - equal:
          path: rules[0].resources[0]
          value: leases
      - contains:
          path: rules[0].verbs
          content: get
      - contains:
          path: rules[0].verbs
          content: create
      - contains:
          path: rules[0].verbs
          content: update

  - it: exec-role default namespace equals release namespace
    documentSelector:
      path: metadata.name
      value: exec-role-tk
    asserts:
      - equal:
          path: metadata.namespace
          value: testkube-dev

  - it: exec-role honors execution.default.namespace override
    set:
      execution.default.namespace: jobs-ns
    documentSelector:
      path: metadata.name
      value: exec-role-tk
    asserts:
      - equal:
          path: metadata.namespace
          value: jobs-ns

  - it: omits agent roles when pod.serviceAccount.autoCreate=false
    set:
      pod.serviceAccount.autoCreate: false
      execution.default.serviceAccount.autoCreate: false
    asserts:
      - hasDocuments:
          count: 0

  - it: creates watchers ClusterRole when listener.enabled + watchAllNamespaces
    set:
      listener.enabled: true
      listener.watchAllNamespaces: true
    documentSelector:
      path: metadata.name
      value: watchers-role-tk
    asserts:
      - equal:
          path: kind
          value: ClusterRole

  - it: creates watchers Role per namespace when watchAllNamespaces=false
    set:
      listener.enabled: true
      listener.watchAllNamespaces: false
    documentSelector:
      path: metadata.name
      value: watchers-role-tk
    asserts:
      - equal:
          path: kind
          value: Role

  - it: also creates watchers when gitops.enabled even if listener disabled
    set:
      listener.enabled: false
      gitops.enabled: true
      listener.watchAllNamespaces: true
    documentSelector:
      path: metadata.name
      value: watchers-role-tk
    asserts:
      - equal:
          path: kind
          value: ClusterRole

  - it: no watchers role when listener and gitops both disabled
    asserts:
      - hasDocuments:
          count: 3

{{- /*
Cluster-scoped CRD read for the agent's cluster-resources inventory
(internal/inventory): the agent lists/watches CustomResourceDefinitions to build
the inventory snapshot it pushes to the Control Plane. A namespaced Role can't
grant cluster-scoped CRD access, so this ClusterRole is required when the agent
runs in multinamespace (cluster-scoped) mode. Without it the inventory's CRD
informer is forbidden and live refresh on CRD changes stops working.
*/}}
{{- if (index .Values "testkube-api" "multinamespace" "enabled") }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Release.Namespace }}-testkube-api-crd-reader
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/part-of: testkube
rules:
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Release.Namespace }}-testkube-api-crd-reader
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/part-of: testkube
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ .Release.Namespace }}-testkube-api-crd-reader
subjects:
  - kind: ServiceAccount
    name: testkube-api-server
    namespace: {{ .Release.Namespace }}
{{- end }}

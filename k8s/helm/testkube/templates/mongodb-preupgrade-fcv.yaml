{{- if and .Values.mongodb.enabled .Values.mongodb.preUpgradeFCVJob.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "testkube.mongoFcv.prepareName" . }}
  labels:
    {{- include "testkube.mongoFcv.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation
    {{- with .Values.mongodb.preUpgradeFCVJob.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  backoffLimit: {{ .Values.mongodb.preUpgradeFCVJob.backoffLimit }}
  template:
    metadata:
      {{- with .Values.mongodb.preUpgradeFCVJob.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "testkube.mongoFcv.labels" . | nindent 8 }}
    spec:
      {{- $imagePullSecrets := coalesce .Values.global.imagePullSecrets .Values.mongodb.preUpgradeFCVJob.imagePullSecrets .Values.mongodb.image.pullSecrets }}
      {{- with $imagePullSecrets }}
      imagePullSecrets:
        {{- range . }}
        {{- if typeIsLike "map[string]interface {}" . }}
        - name: {{ .name | quote }}
        {{- else }}
        - name: {{ . | quote }}
        {{- end }}
        {{- end }}
      {{- end }}
      serviceAccountName: {{ default "default" .Values.mongodb.preUpgradeFCVJob.serviceAccountName }}
      securityContext: {{ include "testkube.mongoFcv.podSecurityContext" . | nindent 8 }}
      nodeSelector: {{- include "testkube.mongoFcv.nodeSelector" . | nindent 8 }}
      affinity: {{- include "testkube.mongoFcv.affinity" . | nindent 8 }}
      tolerations: {{- include "testkube.mongoFcv.tolerations" . | nindent 8 }}
      restartPolicy: Never
      containers:
        - name: fcv-prepare
          image: "{{ .Values.mongodb.image.registry }}/{{ .Values.mongodb.image.repository }}:{{ .Values.mongodb.image.tag }}"
          securityContext: {{ include "testkube.mongoFcv.containerSecurityContext" . | nindent 12 }}
          command:
            - /bin/sh
            - -c
            - |
              set -e
              echo "Checking MongoDB FCV prerequisites..."
              FINAL_TARGET_VERSION="{{ default (regexFind "^[0-9]+\\.[0-9]+" (.Values.mongodb.image.tag | toString)) .Values.mongodb.featureCompatibilityVersion }}"
              HOST="{{ .Values.mongodb.fullnameOverride }}"
              AUTH_ENABLED="{{ .Values.mongodb.auth.enabled | default false }}"
              TARGET_VERSION="$FINAL_TARGET_VERSION"
              if [ "$FINAL_TARGET_VERSION" = "8.2" ]; then
                TARGET_VERSION="8.0"
              fi
              echo "Final target FCV: $FINAL_TARGET_VERSION"
              echo "Pre-upgrade target FCV: $TARGET_VERSION"
              echo "Mongo host: $HOST"
              if [ "$AUTH_ENABLED" = "true" ]; then
                echo "MongoDB authentication is ENABLED"
              else
                echo "MongoDB authentication is DISABLED"
              fi
              run_mongosh() {
                if [ "$AUTH_ENABLED" = "true" ]; then
                  mongosh \
                    --host "$HOST" \
                    --username "$MONGO_USERNAME" \
                    --password "$MONGO_PASSWORD" \
                    --authenticationDatabase admin \
                    "$@"
                else
                  mongosh \
                    --host "$HOST" \
                    "$@"
                fi
              }
              is_version_greater() {
                [ "$1" != "$2" ] && [ "$(printf '%s\n%s\n' "$1" "$2" | sort -V | tail -n1)" = "$1" ]
              }
              echo "Waiting for MongoDB to become reachable..."
              ATTEMPTS=0
              MAX_ATTEMPTS=60
              until run_mongosh --quiet --eval 'db.adminCommand({ ping: 1 }).ok' >/dev/null 2>&1; do
                ATTEMPTS=$((ATTEMPTS + 1))
                if [ "$ATTEMPTS" -ge "$MAX_ATTEMPTS" ]; then
                  echo "ERROR: MongoDB did not become reachable after $MAX_ATTEMPTS attempts"
                  exit 1
                fi
                echo "MongoDB is not reachable yet, retrying in 5 seconds... ($ATTEMPTS/$MAX_ATTEMPTS)"
                sleep 5
              done
              echo "Fetching current FCV..."
              CURRENT_FCV=$(run_mongosh --quiet --eval 'db.adminCommand({getParameter: 1, featureCompatibilityVersion: 1}).featureCompatibilityVersion.version')
              SERVER_VERSION=$(run_mongosh --quiet --eval 'db.version().match(/^[0-9]+\.[0-9]+/)[0]')
              if [ -z "$CURRENT_FCV" ]; then
                echo "ERROR: Could not determine current FCV"
                exit 1
              fi
              if [ -z "$SERVER_VERSION" ]; then
                echo "ERROR: Could not determine current MongoDB server version"
                exit 1
              fi
              echo "Current FCV: $CURRENT_FCV"
              echo "Current server version: $SERVER_VERSION"
              if [ "$CURRENT_FCV" = "$TARGET_VERSION" ]; then
                echo "Pre-upgrade FCV already correct. No action needed."
              else
                if is_version_greater "$CURRENT_FCV" "$TARGET_VERSION"; then
                  echo "ERROR: refusing to downgrade FCV from $CURRENT_FCV to $TARGET_VERSION"
                  exit 1
                fi
                if is_version_greater "$TARGET_VERSION" "$SERVER_VERSION"; then
                  echo "ERROR: MongoDB $SERVER_VERSION cannot set FCV to $TARGET_VERSION yet. Upgrade binaries through the required intermediate version first."
                  exit 1
                fi
                echo "Updating pre-upgrade FCV from $CURRENT_FCV to $TARGET_VERSION"
                run_mongosh --eval "db.adminCommand({ setFeatureCompatibilityVersion: \"$TARGET_VERSION\", confirm: true })"
                echo "Pre-upgrade FCV successfully updated."
              fi
              echo "FCV pre-upgrade check completed successfully."
          env:
            - name: MONGO_AUTH_ENABLED
              value: "{{ .Values.mongodb.auth.enabled | default false }}"
            {{- if .Values.mongodb.auth.enabled }}
            - name: MONGO_USERNAME
              value: "{{ .Values.mongodb.auth.rootUser | default "root" }}"
            - name: MONGO_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.mongodb.auth.existingSecret | default (.Values.mongodb.fullnameOverride | default (printf "%s-mongodb" .Release.Name)) }}
                  key: mongodb-root-password
            {{- end }}
            {{- with .Values.mongodb.preUpgradeFCVJob.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
{{- end }}

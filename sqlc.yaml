version: "2"
sql:
  - engine: "postgresql"
    queries: "pkg/database/postgres/queries/*.sql"
    schema: "pkg/database/postgres/migrations"
    gen:
      go:
        package: "sqlc"
        out: "pkg/database/postgres/sqlc"
        emit_db_tags: true
        emit_json_tags: true
        sql_package: "pgx/v5"
        overrides:
          - db_type: "uuid"
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
          # section for v_test_workflow_execution_details (view)
          - column: "v_test_workflow_execution_details.runner_target"
            go_type:
              type: "ExecutionTarget"
              import: "github.com/kubeshop/testkube/pkg/api/v1/testkube"
              pointer: true
          - column: "v_test_workflow_execution_details.runner_original_target"
            go_type:
              type: "ExecutionTarget"
              import: "github.com/kubeshop/testkube/pkg/api/v1/testkube"
              pointer: true
          - column: "v_test_workflow_execution_details.tags"
            go_type:
              type: "map[string]string"
          - column: "v_test_workflow_execution_details.running_context"
            go_type:
              type: "TestWorkflowRunningContext"
              import: "github.com/kubeshop/testkube/pkg/api/v1/testkube"
              pointer: true
          - column: "v_test_workflow_execution_details.config_params"
            go_type:
              type: "map[string]testkube.TestWorkflowExecutionConfigValue"
          - column: "v_test_workflow_execution_details.runtime"
            go_type:
              type: "TestWorkflowExecutionRuntime"
              import: "github.com/kubeshop/testkube/pkg/api/v1/testkube"
              pointer: true
          - column: "v_test_workflow_execution_details.silent_mode"
            go_type:
              type: "SilentMode"
              import: "github.com/kubeshop/testkube/pkg/api/v1/testkube"
              pointer: true
          # section for v_test_workflow_execution_details workflow columns
          - column: "v_test_workflow_execution_details.workflow_labels"
            go_type:
              type: "map[string]string"
          - column: "v_test_workflow_execution_details.workflow_annotations"
            go_type:
              type: "map[string]string"
          - column: "v_test_workflow_execution_details.workflow_spec"
            go_type:
              type: "TestWorkflowSpec"
              import: "github.com/kubeshop/testkube/pkg/api/v1/testkube"
              pointer: true
          - column: "v_test_workflow_execution_details.workflow_status"
            go_type:
              type: "TestWorkflowStatusSummary"
              import: "github.com/kubeshop/testkube/pkg/api/v1/testkube"
              pointer: true
          - column: "v_test_workflow_execution_details.resolved_workflow_labels"
            go_type:
              type: "map[string]string"
          - column: "v_test_workflow_execution_details.resolved_workflow_annotations"
            go_type:
              type: "map[string]string"
          - column: "v_test_workflow_execution_details.resolved_workflow_spec"
            go_type:
              type: "TestWorkflowSpec"
              import: "github.com/kubeshop/testkube/pkg/api/v1/testkube"
              pointer: true
          - column: "v_test_workflow_execution_details.resolved_workflow_status"
            go_type:
              type: "TestWorkflowStatusSummary"
              import: "github.com/kubeshop/testkube/pkg/api/v1/testkube"
              pointer: true
          # section for v_test_workflow_execution_details result columns
          - column: "v_test_workflow_execution_details.pauses"
            go_type:
              type: "TestWorkflowPause"
              import: "github.com/kubeshop/testkube/pkg/api/v1/testkube"
              slice: true
          - column: "v_test_workflow_execution_details.initialization"
            go_type:
              type: "TestWorkflowStepResult"
              import: "github.com/kubeshop/testkube/pkg/api/v1/testkube"
              pointer: true
          - column: "v_test_workflow_execution_details.steps"
            go_type:
              type: "map[string]testkube.TestWorkflowStepResult"
          # section for v_test_workflow_execution_details aggregation columns
          - column: "v_test_workflow_execution_details.resource_aggregations_global"
            go_type:
              type: "map[string]map[string]testkube.TestWorkflowExecutionResourceAggregations"
          - column: "v_test_workflow_execution_details.resource_aggregations_step"
            go_type:
              type: "TestWorkflowExecutionStepResourceAggregations"
              import: "github.com/kubeshop/testkube/pkg/api/v1/testkube"
              slice: true
          # section for test_workflows (used by non-view queries)
          - column: "test_workflows.labels"
            go_type:
              type: "map[string]string"
          - column: "test_workflows.annotations"
            go_type:
              type: "map[string]string"
          - column: "test_workflows.spec"
            go_type:
              type: "TestWorkflowSpec"
              import: "github.com/kubeshop/testkube/pkg/api/v1/testkube"
              pointer: true
          - column: "test_workflows.status"
            go_type:
              type: "TestWorkflowStatusSummary"
              import: "github.com/kubeshop/testkube/pkg/api/v1/testkube"
              pointer: true
          # section for test_workflow_results (used by non-view queries)
          - column: "test_workflow_results.pauses"
            go_type:
              type: "TestWorkflowPause"
              import: "github.com/kubeshop/testkube/pkg/api/v1/testkube"
              slice: true
          - column: "test_workflow_results.initialization"
            go_type:
              type: "TestWorkflowStepResult"
              import: "github.com/kubeshop/testkube/pkg/api/v1/testkube"
              pointer: true
          - column: "test_workflow_results.steps"
            go_type:
              type: "map[string]testkube.TestWorkflowStepResult"
          # section for test_workflow_outputs
          - column: "test_workflow_outputs.value"
            go_type:
              type: "map[string]interface{}"
          # section for test_workflow_reports
          - column: "test_workflow_reports.summary"
            go_type:
              type: "TestWorkflowReportSummary"
              import: "github.com/kubeshop/testkube/pkg/api/v1/testkube"
              pointer: true
          # section for test_workflow_resource_aggregations
          - column: "test_workflow_resource_aggregations.global"
            go_type:
              type: "map[string]map[string]testkube.TestWorkflowExecutionResourceAggregations"
          - column: "test_workflow_resource_aggregations.step"
            go_type:
              type: "TestWorkflowExecutionStepResourceAggregations"
              import: "github.com/kubeshop/testkube/pkg/api/v1/testkube"
              slice: true
  # Use SQLC for jsonb parsing instead of doing it all manually
  - engine: "postgresql"
    queries: "pkg/controlplane/scheduling/sqlc/*.sql"
    schema: "pkg/database/postgres/migrations"
    gen:
      go:
        package: "sqlc"
        out: "pkg/controlplane/scheduling/sqlc"
        emit_db_tags: true
        emit_json_tags: true
        sql_package: "pgx/v5"
        overrides:
          - db_type: "uuid"
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
          # section for test_workflow_executions
          - column: "test_workflow_executions.runner_target"
            go_type:
              type: "ExecutionTarget"
              import: "github.com/kubeshop/testkube/pkg/api/v1/testkube"
              pointer: true
          - column: "test_workflow_executions.runner_original_target"
            go_type:
              type: "ExecutionTarget"
